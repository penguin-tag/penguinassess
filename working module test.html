<script>
    // ==================== GOOGLE SHEETS BACKEND CONFIGURATION ====================
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyp1AxArHrSS-rOXtXQdDU_d4U9VLS_NhInpVY-e0Njr_RU4Y-TUMCfMcDcgp-ZGav-/exec";
    const USE_CLOUD = true;
    
    let ratingsCache = {};
    let isLoading = false;
    
    // ==================== CLOUD SYNC FUNCTIONS ====================
    async function loadRatingsFromCloud() {
        if (!USE_CLOUD) {
            loadFromLocalStorage();
            return;
        }
        
        try {
            isLoading = true;
            showToast("🔄 Syncing ratings from cloud...");
            
            const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getRatings`, {
                method: 'GET',
                mode: 'cors'
            });
            
            if (response.ok) {
                const data = await response.json();
                if (data.success && data.ratings) {
                    ratingsCache = data.ratings;
                    localStorage.setItem("RatingBackup", JSON.stringify(ratingsCache));
                    showToast("✅ Ratings synced from cloud");
                } else {
                    loadFromLocalStorage();
                }
            } else {
                loadFromLocalStorage();
            }
        } catch (error) {
            console.error("Cloud load error:", error);
            loadFromLocalStorage();
            showToast("⚠️ Using local cache (cloud unavailable)");
        } finally {
            isLoading = false;
            refreshAllViews();
        }
    }
    
    function loadFromLocalStorage() {
        const stored = localStorage.getItem("RatingBackup");
        if (stored) {
            try {
                ratingsCache = JSON.parse(stored);
            } catch(e) { ratingsCache = {}; }
        } else {
            ratingsCache = {};
        }
    }
    
    function saveToLocalStorage() {
        localStorage.setItem("RatingBackup", JSON.stringify(ratingsCache));
    }
    
    async function pushRatingToCloud(subjectId, chapterId, teacherId, ratingValue, teacherName, chapterTitle, subjectName) {
        if (!USE_CLOUD) return true;
        
        try {
            const formData = new FormData();
            formData.append("action", "addRating");
            formData.append("subjectId", subjectId);
            formData.append("chapterId", chapterId);
            formData.append("teacherId", teacherId);
            formData.append("rating", ratingValue);
            formData.append("teacherName", teacherName);
            formData.append("chapterTitle", chapterTitle);
            formData.append("subjectName", subjectName);
            formData.append("timestamp", new Date().toISOString());
            
            const response = await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                body: formData,
                mode: 'cors'
            });
            
            if (response.ok) {
                const result = await response.json();
                if (result.success && result.allRatings) {
                    const key = getRatingsKey(subjectId, chapterId, teacherId);
                    ratingsCache[key] = result.allRatings;
                    saveToLocalStorage();
                    return true;
                }
            }
            return false;
        } catch (error) {
            console.error("Cloud push error:", error);
            return false;
        }
    }
    
    function getRatingsKey(subjectId, chapterId, teacherId) {
        return `${subjectId}|${chapterId}|${teacherId}`;
    }
    
    function addGlobalRating(subjectId, chapterId, teacherId, ratingValue, teacherName, chapterTitle, subjectName) {
        const key = getRatingsKey(subjectId, chapterId, teacherId);
        
        if (!ratingsCache[key]) ratingsCache[key] = [];
        ratingsCache[key].push(parseFloat(ratingValue));
        
        saveToLocalStorage();
        
        pushRatingToCloud(subjectId, chapterId, teacherId, ratingValue, teacherName, chapterTitle, subjectName)
            .then(success => {
                if (success) {
                    showToast(`🌍 ${teacherName} rated ${ratingValue}/10 → synced globally`);
                } else {
                    showToast(`🍊 ${teacherName} rated ${ratingValue}/10 (saved locally, will sync later)`);
                }
            });
        
        return ratingsCache[key];
    }
    
    function getAverageRating(subjectId, chapterId, teacherId) {
        const key = getRatingsKey(subjectId, chapterId, teacherId);
        const arr = ratingsCache[key];
        if (!arr || arr.length === 0) return null;
        const sum = arr.reduce((a, b) => a + b, 0);
        return (sum / arr.length).toFixed(1);
    }
    
    function getRatingCount(subjectId, chapterId, teacherId) {
        const key = getRatingsKey(subjectId, chapterId, teacherId);
        return ratingsCache[key]?.length || 0;
    }
    
    function showToast(msg) {
        let toast = document.querySelector('.toast-msg');
        if (!toast) {
            toast = document.createElement('div');
            toast.className = 'toast-msg';
            document.body.appendChild(toast);
        }
        toast.textContent = msg;
        toast.style.opacity = '1';
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => {
                if (toast && toast.parentNode) toast.remove();
            }, 800);
        }, 2700);
    }
    
    function refreshAllViews() {
        renderSubjects();
        renderChapters();

    }

            return { ...teacher, ratings: [...saved] };

    let currentSubjectId = null;
    let currentChapterId = null;
    
    function getSubject(id) { return subjectsCatalog.find(s => s.id === id); }
    function getChapter(subjectId, chapterId) {
        const sub = getSubject(subjectId);
        if (!sub) return null;
        return sub.getChapters(subjectId).find(ch => ch.id === chapterId);
    }
    
    function renderSubjects() {
        const container = document.getElementById('subjectsList');
        container.innerHTML = subjectsCatalog.map(sub => `
            <div class="subject-entry ${currentSubjectId === sub.id ? 'active-subject' : ''}" data-id="${sub.id}">
                <img class="subject-img" src="${sub.imageurl}" onerror="this.src='https://via.placeholder.com/46x46?text=📘'">
                <div class="subject-info"><div class="subject-name">${escapeHtml(sub.name)}</div><div class="subject-desc">${escapeHtml(sub.description)}</div></div>
            </div>
        `).join('');
        document.querySelectorAll('.subject-entry').forEach(el => {
            el.addEventListener('click', () => { currentSubjectId = el.dataset.id; currentChapterId = null; renderSubjects(); renderChapters(); renderTeachers(); });
        });
    }
    
    function renderChapters() {
        const container = document.getElementById('chaptersList');
        if (!currentSubjectId) { container.innerHTML = '<div class="empty-message"> select a subject first</div>'; return; }
        const sub = getSubject(currentSubjectId);
        if (!sub) return;
        const chapters = sub.getChapters(currentSubjectId);
        container.innerHTML = chapters.map(ch => `
            <div class="chapter-entry ${currentChapterId === ch.id ? 'active-chapter' : ''}" data-chid="${ch.id}">
                <img class="chapter-img" src="${ch.img}" onerror="this.src='https://via.placeholder.com/46x46?text=📖'">
                <div class="chapter-info"><div class="chapter-name">${escapeHtml(ch.title)}</div><div class="subject-desc"></div></div>
            </div>
        `).join('');
        document.querySelectorAll('.chapter-entry').forEach(el => {
            el.addEventListener('click', () => { currentChapterId = el.dataset.chid; renderChapters(); renderTeachers(); });
        });
    }
    
    function renderTeachers() {
        const container = document.getElementById('teachersList');
        if (!currentSubjectId || !currentChapterId) { container.innerHTML = '<div class="empty-message"> pick a chapter to rate teachers</div>'; return; }
        const sub = getSubject(currentSubjectId);
        const chapter = getChapter(currentSubjectId, currentChapterId);
        if (!chapter) return;
        const teachers = chapter.getTeachers();
        const subjectName = sub.name;
        const chapterTitle = chapter.title;
        container.innerHTML = teachers.map(teacher => {
            const avg = getAverageRating(currentSubjectId, currentChapterId, teacher.id);
            const cnt = getRatingCount(currentSubjectId, currentChapterId, teacher.id);
            return `
                <div class="teacher-item" data-tid="${teacher.id}">
                    <div class="teacher-flex">
                        <img class="teacher-avatar" src="${teacher.imageurl}" onerror="this.src='https://via.placeholder.com/56x56?text=👩‍🏫'">
                        <div class="teacher-details">
                            <div class="teacher-name">${escapeHtml(teacher.name)}</div>
                            <div class="rating-controls">
                                <input type="number" class="rating-input" id="rate_${teacher.id}" step="0.5" min="0" max="10" placeholder="0–10">
                                <button class="rating-btn" data-tid="${teacher.id}">🎯 rate</button>
                            </div>
                        </div>
                    </div>
                    <div class="rating-stats"><span>🍊 eternal avg</span><span class="avg-score">${avg ? avg + '/10' : '—'}</span>${cnt ? `(${cnt} vote${cnt !== 1 ? 's' : ''})` : ''}</div>
                </div>
            `;
        }).join('');
        
        document.querySelectorAll('.rating-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const teacherId = btn.dataset.tid;
                const input = document.getElementById(`rate_${teacherId}`);
                const raw = input?.value.trim();
                if (!raw) return;
                const num = parseFloat(raw);
                if (isNaN(num) || num < 0 || num > 10) return;
                const subj = getSubject(currentSubjectId);
                const chap = getChapter(currentSubjectId, currentChapterId);
                const teacherObj = chap.getTeachers().find(t => t.id === teacherId);
                if (teacherObj) {
                    addGlobalRating(currentSubjectId, currentChapterId, teacherId, num, teacherObj.name, chap.title, subj.name);
                    input.value = '';
                    btn.textContent = '✓ saved';
                    setTimeout(() => { btn.textContent = '🎯 rate'; renderTeachers(); }, 500);
                }
            });
        });
    }
    
    function resetAll() { currentSubjectId = null; currentChapterId = null; renderSubjects(); renderChapters(); renderTeachers(); }
    function backToSubjects() { currentChapterId = null; renderChapters(); renderTeachers(); }
    function backToChapters() { currentChapterId = null; renderTeachers(); }
    function escapeHtml(str) { return str?.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])) || ''; }
    
    // Initialize
    subjectsCatalog = buildSubjectsCatalog();
    
    // Render instantly first
    renderSubjects();
    renderChapters();
    renderTeachers();

    // Then load cloud in background
    loadRatingsFromCloud();

    
    document.getElementById('resetAllBtn').addEventListener('click', resetAll);
    document.getElementById('backToSubjects').addEventListener('click', backToSubjects);
    document.getElementById('backToChapters').addEventListener('click', backToChapters);
</script>
